<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study - To-Do List</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .todo-container { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .task-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); border-left: 5px solid var(--primary); display: flex; align-items: center; gap: 20px; transition: transform 0.2s; }
        .task-card.completed { border-left-color: #2ecc71; opacity: 0.7; }
        .task-card.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
        .task-info { flex-grow: 1; }
        .task-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; display: block; }
        .task-meta { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 15px; }
        .checkbox-container { width: 30px; height: 30px; border: 2px solid #dfe6e9; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .checkbox-container.checked { background: #2ecc71; border-color: #2ecc71; color: white; }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> Smart Study
        </div>
        <ul class="nav-links">
            <li><a href="/"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="/documents"><i class="fas fa-file-alt"></i> Documents</a></li>
            <li><a href="/subjects"><i class="fas fa-book"></i> Subjects</a></li>
            <li><a href="/tasks" class="active"><i class="fas fa-tasks"></i> To-Do List</a></li>
            <li><a href="/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1>To-Do List & Tasks</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Stay organized and track your deadlines</p>
            </div>
        </header>

        <div class="todo-container">
            <!-- Tasks List -->
            <div class="tasks-list">
                <div th:each="task : ${tasks}" th:id="'task-' + ${task.id}" class="task-card" th:classappend="${task.isCompleted ? 'completed' : ''}">
                    <div class="checkbox-container" th:classappend="${task.isCompleted ? 'checked' : ''}" 
                         th:onclick="'markAsComplete(' + ${task.id} + ')'">
                        <i class="fas fa-check" th:style="${task.isCompleted ? 'display:block' : 'display:none'}"></i>
                    </div>
                    
                    <div class="task-info">
                        <span class="task-title" th:text="${task.title}">Math Assignment</span>
                        <p th:text="${task.description}" style="font-size: 0.9rem; margin-bottom: 8px;">Chapter 5 exercises</p>
                        <div class="task-meta">
                            <span><i class="far fa-calendar-alt"></i> Due: <span th:text="${#temporals.format(task.dueDate, 'MMM dd, HH:mm')}">Mar 30, 10:00</span></span>
                        </div>
                    </div>

                    <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post">
                        <button type="submit" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size: 1.2rem;">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </form>
                </div>

                <p th:if="${#lists.isEmpty(tasks)}" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                    Your task list is empty. Add your first goal below! 🎯
                </p>
            </div>

            <!-- Add Task Form -->
            <aside>
                <div style="background: white; border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow); position: sticky; top: 20px;">
                    <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-plus-circle" style="color: var(--primary);"></i> New Task</h3>
                    <form th:action="@{/tasks/add}" method="post">
                        <div style="margin-bottom: 1rem;">
                            <label style="display:block; margin-bottom:8px; font-weight:500;">Task Name</label>
                            <input type="text" name="title" required class="btn" style="background:#f1f2f6; color:#2d3436; width:100%; text-align:left;">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display:block; margin-bottom:8px; font-weight:500;">Details</label>
                            <textarea name="description" rows="3" class="btn" style="background:#f1f2f6; color:#2d3436; width:100%; text-align:left;"></textarea>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display:block; margin-bottom:8px; font-weight:500;">Due Date & Time</label>
                            <input type="datetime-local" name="dueDate" required class="btn" style="background:#f1f2f6; color:#2d3436; width:100%;">
                        </div>
                        <button type="submit" class="btn" style="width: 100%;">Add Task</button>
                    </form>
                </div>
            </aside>
        </div>
    </main>

    <script th:inline="javascript">
        function markAsComplete(taskId) {
            const card = document.getElementById('task-' + taskId);
            const checkbox = card.querySelector('.checkbox-container');
            const checkIcon = checkbox.querySelector('i');

            if (checkbox.classList.contains('checked')) return; // Already done

            fetch('/tasks/complete/' + taskId, {
                method: 'POST'
            }).then(response => {
                if (response.ok) {
                    card.classList.add('completed');
                    checkbox.classList.add('checked');
                    checkIcon.style.display = 'block';
                    
                    // Simple sound/visual effect could go here
                } else {
                    alert('Error updating task status');
                }
            });
        }
    </script>
</body>
</html>
