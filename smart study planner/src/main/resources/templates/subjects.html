<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Study - Subjects</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> Smart Study
        </div>
        <ul class="nav-links">
            <li><a href="/"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="/documents"><i class="fas fa-file-alt"></i> Documents</a></li>
            <li><a href="/subjects" class="active"><i class="fas fa-book"></i> Subjects</a></li>
            <li><a href="/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1>Your Subjects</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Manage your current courses and curriculum</p>
            </div>
            <button class="btn" onclick="document.getElementById('subjectForm').scrollIntoView({behavior: 'smooth'})">
                <i class="fas fa-plus"></i> Add New Subject
            </button>
        </header>

        <!-- Subjects Grid -->
        <div class="stats-grid" th:if="${not #lists.isEmpty(subjects)}">
            <div class="stat-card" th:each="subject : ${subjects}" 
                 th:style="'border-left-color:' + ${subject.colorCode}">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                    <h3 th:text="${subject.name}" style="font-size: 1.2rem;">Mathematics</h3>
                    <div th:style="'background:' + ${subject.colorCode} + '; width: 25px; height: 10px; border-radius: 5px; opacity:0.6;'"></div>
                </div>
                <p th:text="${subject.description}" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; flex: 1;">Study of numbers, quantities, and shapes.</p>
                <div style="display: flex; gap: 10px; border-top: 1px solid #f1f2f6; padding-top: 1rem;">
                    <a th:href="@{/documents}" style="color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 600;">
                        <i class="fas fa-file-alt"></i> Docs
                    </a>
                    <a th:href="@{/subjects/{id}/board(id=${subject.id})}" style="color: var(--secondary); text-decoration: none; font-size: 0.85rem; font-weight: 600; margin-left: auto;">
                        <i class="fas fa-external-link-alt"></i> Study Board
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Placeholder if no subjects -->
        <div th:if="${#lists.isEmpty(subjects)}" style="text-align: center; color: var(--text-muted); padding: 5rem 0;">
            <i class="fas fa-book-open fa-4x" style="opacity: 0.2; margin-bottom: 1rem;"></i>
            <p>No subjects found. Add your first subject below!</p>
        </div>

        <!-- Add Subject Form -->
        <div id="subjectForm" class="dashboard-section" style="margin-top: 3rem;">
            <h2>Add New Subject</h2>
            <form th:action="@{/subjects/create}" th:object="${newSubject}" method="post" style="display: grid; grid-template-columns: 2fr 1fr auto; gap: 15px; align-items: flex-end;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Subject Name</label>
                    <input type="text" th:field="*{name}" required placeholder="e.g. Machine Learning" 
                           style="width: 100%; padding: 10px; border: 2px solid #f1f2f6; border-radius: 8px; outline: none;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Pick a Color</label>
                    <input type="color" th:field="*{colorCode}" style="width: 100%; height: 42px; border: none; background: none; cursor: pointer;">
                </div>
                <button type="submit" class="btn" style="height: 42px;">Save Subject</button>
                <div style="grid-column: span 3;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Description (Goal)</label>
                    <textarea th:field="*{description}" placeholder="What do you want to achieve in this subject?" rows="3" 
                              style="width: 100%; padding: 10px; border: 2px solid #f1f2f6; border-radius: 8px; outline: none;"></textarea>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
