<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Student Study Planner - Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> Smart Study
        </div>
        <ul class="nav-links">
            <li><a href="/" class="active"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="/documents"><i class="fas fa-file-alt"></i> Documents</a></li>
            <li><a href="/subjects"><i class="fas fa-book"></i> Subjects</a></li>
            <li><a href="/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1>Dashboard Summary</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Welcome back to your Study Planner</p>
            </div>
            <div class="user-profile">
                <!-- User Profile info could go here -->
            </div>
        </header>

        <!-- Top Stat Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-title">Total Subjects</span>
                <span class="stat-value" th:text="${totalSubjects}">5</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Total Documents</span>
                <span class="stat-value" th:text="${totalDocuments}">12</span>
            </div>
        </div>

        <!-- Recent Activity Feed -->
        <section class="dashboard-section recent-activity">
            <h2>Recent Activity</h2>
            <div class="activity-feed">
                <!-- Example Activity Items -->
                <div class="activity-item" th:each="activity : ${recentActivities}">
                    <div class="activity-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="activity-details">
                        <p class="activity-desc" th:text="${activity.description}">Added Math PPT for Algebra Revision</p>
                        <span class="activity-time" th:text="${#temporals.format(activity.timestamp, 'HH:mm - MMM dd')}">14:00 - Mar 29</span>
                    </div>
                </div>
                
                <!-- Placeholder if no activities exist -->
                <p th:if="${#lists.isEmpty(recentActivities)}" style="text-align: center; color: var(--text-muted); padding: 2rem;">No recent activity yet. Start by adding a subject!</p>
            </div>
        </section>
    </main>

</body>
</html>
