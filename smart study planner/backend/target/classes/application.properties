spring.datasource.password=J12Y05@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configurations
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Static Resources & Upload Path
# Set the path for file storage
# Note: Ensure this directory exists in your actual filesystem or project root.
smartplanner.upload-dir=./uploads

# Security Console Logging (Optional for dev)
logging.level.org.springframework.security=INFO

# Thymeleaf Cache (disable for development)
spring.thymeleaf.cache=false

spring.web.resources.static-locations=file:../frontend/static/
spring.thymeleaf.prefix=file:../frontend/templates/
spring.thymeleaf.suffix=.html

