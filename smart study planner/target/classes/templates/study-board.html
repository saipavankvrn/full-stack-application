<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="'Study Board - ' + ${subject.name}">Study Board</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .board-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .study-card-item { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.3s; }
        .study-card-item:hover { transform: scale(1.02); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #f1f2f6; }
        .card-body { padding: 1.5rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: #2d3436; }
        .card-content { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; white-space: pre-wrap; }
        .subject-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> Smart Study
        </div>
        <ul class="nav-links">
            <li><a href="/"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="/documents"><i class="fas fa-file-alt"></i> Documents</a></li>
            <li><a href="/subjects" class="active"><i class="fas fa-book"></i> Subjects</a></li>
            <li><a href="/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="header">
            <div>
                <a href="/subjects" style="color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 600;">
                    <i class="fas fa-arrow-left"></i> Back to Subjects
                </a>
                <h1 th:text="${subject.name} + ' Study Board'" style="margin-top: 5px;">Math Study Board</h1>
            </div>
            <button class="btn" onclick="document.getElementById('addCard').scrollIntoView({behavior: 'smooth'})">
                <i class="fas fa-magic"></i> New Revision Card
            </button>
        </header>

        <!-- Top Overview -->
        <div style="background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: var(--shadow);">
            <h3>Subject Files</h3>
            <div style="display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap;">
                <div th:each="doc : ${documents}" 
                     style="background: #f1f2f6; padding: 8px 15px; border-radius: 8px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
                     <i class="fas fa-file-pdf" style="color: #e74c3c"></i>
                     <span th:text="${doc.fileName}">Lecture.pdf</span>
                </div>
                <p th:if="${#lists.isEmpty(documents)}" style="color: var(--text-muted); font-size: 0.9rem;">No files uploaded for this subject yet.</p>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="board-container">
            <div class="study-card-item" th:each="card : ${studyCards}">
                <img th:if="${card.imagePath != null}" th:src="@{'/uploads/' + ${card.imagePath}}" class="card-img" alt="Card Image">
                <div class="card-body">
                    <span class="subject-badge" th:style="'background:' + ${subject.colorCode}" th:text="${subject.name}">Mathematics</span>
                    <h3 class="card-title" th:text="${card.title}">Quick Formula</h3>
                    <p class="card-content" th:text="${card.content}">E = mc²</p>
                </div>
            </div>
        </div>

        <!-- Add Card Form -->
        <div id="addCard" class="dashboard-section" style="margin-top: 3rem;">
            <h2>Add Revision Card</h2>
            <form th:action="@{'/subjects/' + ${subject.id} + '/cards/add'}" method="post" enctype="multipart/form-data">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Card Title</label>
                        <input type="text" name="title" required placeholder="Topic or Question" 
                               style="width: 100%; padding: 10px; border: 2px solid #f1f2f6; border-radius: 8px;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Attach Image (Optional)</label>
                        <input type="file" name="image" class="btn" style="background: #f1f2f6; color: #2d3436; width: 100%;">
                    </div>
                    <div style="grid-column: span 2;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Explanation / Content</label>
                        <textarea name="content" required placeholder="Detailed notes for revision..." rows="4" 
                                  style="width: 100%; padding: 10px; border: 2px solid #f1f2f6; border-radius: 8px;"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn" style="margin-top: 15px;">Add to Board</button>
            </form>
        </div>
    </main>

</body>
</html>
