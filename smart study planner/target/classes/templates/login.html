<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Study - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%); }
        .auth-container { background: #fff; padding: 3rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 400px; text-align: center; }
        .auth-container h1 { margin-bottom: 2rem; color: #2d3436; font-size: 2rem; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #636e72; font-weight: 500; }
        .input-group input { width: 100%; border: 2px solid #f1f2f6; border-radius: 10px; padding: 12px; outline: none; transition: border-color 0.3s; }
        .input-group input:focus { border-color: #6c5ce7; }
        .btn-full { width: 100%; padding: 14px; margin-top: 1rem; }
        .auth-link { margin-top: 1.5rem; display: block; color: #6c5ce7; text-decoration: none; font-weight: 500; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; margin-bottom: 1rem; }
        .success-msg { background: #dcfce7; color: #16a34a; padding: 10px; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <i class="fas fa-graduation-cap fa-3x" style="color: #6c5ce7; margin-bottom: 1rem;"></i>
        <h1>Welcome Back</h1>
        
        <div th:if="${param.error}" class="error-msg">Invalid username or password.</div>
        <div th:if="${param.signup_success}" class="success-msg">Signup successful! Please login.</div>
        
        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-full">Login</button>
        </form>
        
        <a th:href="@{/signup}" class="auth-link">New user? Create an account</a>
    </div>
</body>
</html>
