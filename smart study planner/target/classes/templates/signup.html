<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Study - Sign Up</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #00cec9 0%, #6c5ce7 100%); min-height: 100vh; }
        .auth-container { background: #fff; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 450px; text-align: center; margin-top: 50px; margin-bottom: 50px; }
        .auth-container h1 { margin-bottom: 1.5rem; color: #2d3436; font-size: 1.8rem; }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; color: #636e72; font-weight: 500; font-size: 0.9rem; }
        .input-group input { width: 100%; border: 2px solid #f1f2f6; border-radius: 10px; padding: 10px; outline: none; transition: border-color 0.3s; }
        .input-group input:focus { border-color: #6c5ce7; }
        .btn-full { width: 100%; padding: 12px; margin-top: 1rem; }
        .auth-link { margin-top: 1.5rem; display: block; color: #6c5ce7; text-decoration: none; font-weight: 500; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <i class="fas fa-graduation-cap fa-2x" style="color: #6c5ce7; margin-bottom: 0.5rem;"></i>
        <h1>Create Student Account</h1>
        
        <div th:if="${param.error == 'username_taken'}" class="error-msg">Username already exists. Choose another.</div>
        
        <form th:action="@{/signup}" th:object="${user}" method="post">
            <div class="input-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" required placeholder="Pick a username">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" required placeholder="you@student.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required placeholder="Make it strong">
            </div>
            <button type="submit" class="btn btn-full">Sign Up</button>
        </form>
        
        <a th:href="@{/login}" class="auth-link">Already have an account? Login here</a>
    </div>
</body>
</html>
