<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Student Study Planner - Visual Analytics</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .chart-container {
            background: var(--card-bg, #fff);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @media (max-width: 768px) {
            .analytics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> Smart Study
        </div>
        <ul class="nav-links">
            <li><a href="/"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="/documents"><i class="fas fa-file-alt"></i> Documents</a></li>
            <li><a href="/subjects"><i class="fas fa-book"></i> Subjects</a></li>
            <li><a href="/tasks"><i class="fas fa-tasks"></i> To-Do List</a></li>
            <li><a href="/analytics" class="active"><i class="fas fa-chart-pie"></i> Visual Analytics</a></li>
            <li><a href="/profile"><i class="fas fa-user-circle"></i> Profile</a></li>
            <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1>Visual Analytics</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Track your productivity and study sessions.</p>
            </div>
            <div class="user-profile">
                <a href="/profile" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-user-circle fa-2x" style="color: var(--primary);"></i>
                    <span th:text="${user != null ? user.username : 'Student'}" style="font-weight: 600;">Student Name</span>
                </a>
            </div>
        </header>

        <!-- Use a hidden input to let the tracker know which page this is for analytics purposes -->
        <input type="hidden" id="pageContext" value="Visual Analytics">

        <!-- Top Stat Cards -->
        <div class="stats-grid" style="grid-template-columns: 1fr;">
            <div class="stat-card">
                <span class="stat-title">Total Study Time Today</span>
                <span class="stat-value" th:text="${totalStudyTimeToday}" style="color: #2ecc71;">00h 00m</span>
            </div>
        </div>

        <div class="analytics-grid">
            <!-- Time Distribution Chart -->
            <section class="chart-container">
                <h2>Time Distribution by Module</h2>
                <div style="position: relative; height:300px; width:100%; display: flex; justify-content: center; margin-top: 15px;">
                    <canvas id="timeDistributionChart"></canvas>
                </div>
            </section>
        </div>
    </main>

    <!-- Passing data from Thymeleaf to JS -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const chartDataMap = /*[[${chartData}]]*/ {};
        /*]]>*/
        
        const labels = Object.keys(chartDataMap);
        // Convert duration (seconds) to minutes for display
        const data = Object.values(chartDataMap).map(sec => (sec / 60).toFixed(1));

        document.addEventListener("DOMContentLoaded", function() {
            const ctx = document.getElementById('timeDistributionChart').getContext('2d');
            
            if (labels.length === 0) {
                // Display placeholder if no data
                const canvas = document.getElementById('timeDistributionChart');
                const p = document.createElement('p');
                p.textContent = "No data yet. Keep studying!";
                p.style.color = "var(--text-muted)";
                canvas.replaceWith(p);
            } else {
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Time Spent (Minutes)',
                            data: data,
                            backgroundColor: [
                                '#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#34495e', '#1abc9c'
                            ],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                            }
                        }
                    }
                });
            }
        });
    </script>

    <!-- Global Tracker Script -->
    <script th:src="@{/js/tracker.js}"></script>
</body>
</html>
